services:
  postgres:
    image: postgres:17
    container_name: atlas-postgres
    restart: always
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas_password
      POSTGRES_DB: atlas
    ports:
      - "5432:5432"
    volumes:
      - atlas_postgres_data:/var/lib/postgresql/data

volumes:
  atlas_postgres_data:
